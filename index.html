<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pancake Master: Rage Edition</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #2c3e50;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        #game-container {
            background-color: #34495e;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            width: 90%;
            max-width: 500px;
        }

        #score-board {
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 1rem;
            color: #f1c40f;
        }

        /* NEW: Giant Status Text */
        #status-text {
            font-size: 3rem;
            font-weight: 900;
            letter-spacing: 3px;
            margin-bottom: 1rem;
            height: 60px; /* Fixed height so layout doesn't jump */
            text-transform: uppercase;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        #message {
            height: 30px;
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 1rem;
        }

        .success { color: #2ecc71; }
        .failure { color: #e74c3c; }

        #griddle {
            width: 100%;
            height: 250px;
            background-color: #1a1a1a;
            border-radius: 50%;
            border: 8px solid #000;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.5rem;
            position: relative;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }

        #pancake {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            display: none;
            /* Removed the transition so the color snaps instantly */
        }

        /* Pancake States */
        .raw { background-color: #f5deb3; } 
        .golden { background-color: #d4af37; box-shadow: 0 0 25px #f1c40f; } 
        .burnt { background-color: #222222; }

        /* Text States */
        .text-waiting { color: #bdc3c7; }
        .text-raw { color: #f5deb3; }
        .text-golden { color: #f1c40f; }
        .text-burnt { color: #e74c3c; }

        #progress-container {
            width: 100%;
            height: 20px;
            background-color: #555;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 1.5rem;
        }

        #progress-bar {
            height: 100%;
            width: 0%;
            background-color: #ecf0f1;
        }

        .controls {
            display: flex;
            gap: 1rem;
            justify-content: center;
        }

        button {
            padding: 15px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.1s;
        }

        button:active {
            transform: scale(0.95);
        }

        #pour-btn {
            background-color: #3498db;
            color: white;
        }

        #flip-btn {
            background-color: #e67e22;
            color: white;
        }
        
        button:disabled {
            background-color: #7f8c8d;
            cursor: not-allowed;
            transform: none;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="score-board">Score: <span id="score">0</span></div>
        
        <div id="status-text" class="text-waiting">WAITING...</div>
        
        <div id="message"></div>
        
        <div id="griddle">
            <div id="pancake" class="raw"></div>
        </div>

        <div id="progress-container">
            <div id="progress-bar"></div>
        </div>

        <div class="controls">
            <button id="pour-btn">Pour Batter</button>
            <button id="flip-btn" disabled>FLIP!</button>
        </div>
    </div>

    <script>
        // --- GAME VARIABLES ---
        const RAW_LIMIT_MS = 900;     
        const BURNT_LIMIT_MS = 1000;  
        // Golden Window: 900ms to 1000ms
        
        const POINTS_WIN = 10;
        const POINTS_LOSE = -10;
        // ----------------------

        let score = 0;
        let startTime = 0;
        let animationFrameId;
        let isCooking = false;
        let currentState = "none";

        // DOM Elements
        const scoreEl = document.getElementById('score');
        const statusTextEl = document.getElementById('status-text');
        const messageEl = document.getElementById('message');
        const pancakeEl = document.getElementById('pancake');
        const progressBarEl = document.getElementById('progress-bar');
        const pourBtn = document.getElementById('pour-btn');
        const flipBtn = document.getElementById('flip-btn');

        pourBtn.addEventListener('click', startCooking);
        flipBtn.addEventListener('click', flipPancake);

        function startCooking() {
            if (isCooking) return;

            isCooking = true;
            pourBtn.disabled = true;
            flipBtn.disabled = false;
            messageEl.textContent = "";
            
            // Reset elements to RAW state
            pancakeEl.style.display = 'block';
            pancakeEl.className = 'raw';
            
            statusTextEl.textContent = "RAW...";
            statusTextEl.className = "text-raw";

            currentState = "raw";
            progressBarEl.style.width = '0%';

            startTime = performance.now();
            animationFrameId = requestAnimationFrame(gameLoop);
        }

        function gameLoop(currentTime) {
            if (!isCooking) return;

            const elapsedTime = currentTime - startTime;

            // Update Progress Bar
            let progressPct = (elapsedTime / BURNT_LIMIT_MS) * 100;
            progressBarEl.style.width = Math.min(progressPct, 100) + '%';

            // State Machine Logic with synchronous text updates
            if (elapsedTime >= BURNT_LIMIT_MS && currentState !== "burnt") {
                currentState = "burnt";
                pancakeEl.className = 'burnt';
                statusTextEl.textContent = "BURNT!";
                statusTextEl.className = 'text-burnt';
            } else if (elapsedTime >= RAW_LIMIT_MS && elapsedTime < BURNT_LIMIT_MS && currentState !== "golden") {
                currentState = "golden";
                pancakeEl.className = 'golden';
                statusTextEl.textContent = "PERFECT!";
                statusTextEl.className = 'text-golden';
            }

            // Continue loop
            animationFrameId = requestAnimationFrame(gameLoop);
        }

        function flipPancake() {
            if (!isCooking) return;

            isCooking = false;
            cancelAnimationFrame(animationFrameId);
            pourBtn.disabled = false;
            flipBtn.disabled = true;

            // Evaluate Score
            if (currentState === "golden") {
                score += POINTS_WIN;
                showMessage("NICE REFLEXES! +10", "success");
            } else if (currentState === "raw") {
                score += POINTS_LOSE;
                showMessage("TOO FAST! IT'S RAW! -10", "failure");
            } else if (currentState === "burnt") {
                score += POINTS_LOSE;
                showMessage("TOO SLOW! BURNT! -10", "failure");
            }

            scoreEl.textContent = score;
            
            // Reset text after a second so they can go again
            setTimeout(() => {
                pancakeEl.style.display = 'none';
                progressBarEl.style.width = '0%';
                statusTextEl.textContent = "WAITING...";
                statusTextEl.className = 'text-waiting';
            }, 1200);
        }

        function showMessage(text, className) {
            messageEl.textContent = text;
            messageEl.className = className;
        }
    </script>
</body>
</html>
